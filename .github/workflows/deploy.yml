name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 10m
          script: |
            set -e

            echo "==> Restarting olivebaby-api compose project..."
            cd /docker/olivebaby-api

            docker compose down --timeout 30
            docker compose up -d

            echo "==> Waiting for API to start (git pull + npm install + prisma migrate)..."
            # The API container clones, installs, migrates, then starts - this takes a while
            for i in $(seq 1 60); do
              HEALTH=$(docker compose ps api --format '{{.Health}}' 2>/dev/null || echo "starting")
              STATUS=$(docker compose ps api --format '{{.State}}' 2>/dev/null || echo "unknown")

              if [ "$HEALTH" = "healthy" ]; then
                echo "  API is healthy!"
                break
              fi

              if [ "$STATUS" = "exited" ]; then
                echo "  API container exited unexpectedly!"
                docker compose logs api --tail 40
                exit 1
              fi

              echo "  [$i/60] Status: $STATUS, Health: $HEALTH - waiting..."
              sleep 5
            done

            if [ "$HEALTH" != "healthy" ]; then
              echo "  Timeout waiting for API to become healthy"
              docker compose logs api --tail 40
              exit 1
            fi

            echo "==> Deploy successful!"

      - name: Production health check
        run: |
          sleep 10
          curl -sf --retry 5 --retry-delay 10 --retry-all-errors \
            https://oliecare.cloud/api/v1/health -o /dev/null
          echo "Production health check passed!"
