name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          N8N_API_TOKEN: ${{ secrets.N8N_API_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 10m
          envs: N8N_API_TOKEN
          script: |
            set -e

            echo "==> Cleaning up orphaned containers..."
            docker stop olivebaby-api 2>/dev/null || true
            docker rm olivebaby-api 2>/dev/null || true

            echo "==> Syncing deploy secrets into .env..."
            cd /docker/olivebaby-api
            touch .env
            # Idempotent upsert of N8N_API_TOKEN in .env (used by /admin/n8n/*).
            if [ -n "${N8N_API_TOKEN}" ]; then
              if grep -q '^N8N_API_TOKEN=' .env; then
                sed -i "s|^N8N_API_TOKEN=.*|N8N_API_TOKEN=${N8N_API_TOKEN}|" .env
              else
                echo "N8N_API_TOKEN=${N8N_API_TOKEN}" >> .env
              fi
            fi

            echo "==> Restarting olivebaby-api..."
            docker compose down --timeout 30 --remove-orphans || true
            docker compose up -d

            echo "==> Waiting for API to become healthy (git pull + install + migrate + start)..."
            for i in $(seq 1 60); do
              HEALTH=$(docker inspect olivebaby-api --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' 2>/dev/null || echo "waiting")
              STATE=$(docker inspect olivebaby-api --format='{{.State.Status}}' 2>/dev/null || echo "absent")

              if [ "$HEALTH" = "healthy" ]; then
                echo "  API is healthy!"
                break
              fi

              if [ "$STATE" = "exited" ]; then
                echo "  API container exited unexpectedly!"
                docker compose logs --tail 40
                exit 1
              fi

              echo "  [$i/60] State: $STATE, Health: $HEALTH"
              sleep 5
            done

            if [ "$HEALTH" != "healthy" ]; then
              echo "Timeout waiting for healthy state!"
              docker compose logs --tail 40
              exit 1
            fi

            echo "==> Deploy successful!"

      - name: Production health check
        run: |
          curl -sf --retry 5 --retry-delay 15 --retry-all-errors \
            https://oliecare.cloud/api/v1/health -o /dev/null
          echo "Production health check passed!"
